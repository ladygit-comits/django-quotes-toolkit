<!DOCTYPE html>
<html>
<head>
    <title>Quotes</title>
</head>
<body>
    <!-- Display the randomly chosen quote text -->
    <h1>{{ quote.text }}</h1>
    <!-- Show the author of the quote -->
    <p>- {{ quote.author }}</p>
<!-- Simple form to reload the page and get a new quote -->
    <form method="get">
        <button type="submit">New Quote</button>
    </form>
</body>
</html>
